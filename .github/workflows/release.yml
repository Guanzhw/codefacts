name: Release native binaries and launcher

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  license-audit:
    name: Audit dependency licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --version 0.20.2 --locked
      - run: cargo deny check licenses

  validate:
    name: Validate release source (${{ matrix.os }})
    needs: license-audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings
      - run: cargo build --release --locked --bin codefacts
      - run: node npm/scripts/check-release-version.mjs
      - run: node --test npm/test/*.test.mjs

  validate-launcher:
    name: Validate online launcher
    needs: license-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: node npm/scripts/check-release-version.mjs
      - run: npm pack --dry-run ./npm

  build:
    name: Build (${{ matrix.name }})
    needs: [validate, validate-launcher]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            asset: codefacts-windows-x86_64.exe
          - name: macos-x86_64
            os: macos-15-intel
            asset: codefacts-macos-x86_64
          - name: macos-aarch64
            os: macos-latest
            asset: codefacts-macos-aarch64
          - name: linux-x86_64
            os: ubuntu-latest
            asset: codefacts-linux-x86_64
          - name: linux-aarch64
            os: ubuntu-24.04-arm
            asset: codefacts-linux-aarch64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: cargo build --release --locked --bin codefacts
      - name: Verify packed launcher and stdio protocol on this target
        run: node --test npm/test/*.test.mjs
      - name: Stage Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/codefacts.exe dist/${{ matrix.asset }}
      - name: Stage Unix binary
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/release/codefacts dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  publish-github-release:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - run: cp LICENSE dist/LICENSE
      - name: Generate release checksums
        run: (cd dist && sha256sum codefacts-* > SHA256SUMS)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  publish-npm:
    name: Publish checksum-pinned npm launcher
    needs: publish-github-release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Stage npm package with release checksums
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          (cd dist && sha256sum codefacts-* > SHA256SUMS)
          node npm/scripts/check-release-version.mjs "$VERSION"
          node npm/scripts/stage-package.mjs \
            --version "$VERSION" \
            --checksums dist/SHA256SUMS \
            --output npm-dist
          npm pack --dry-run ./npm-dist
      - name: Configure token fallback when supplied
        shell: bash
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -n "$NPM_TOKEN" ]; then
            npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          fi
      - name: Publish with npm provenance
        run: npm publish ./npm-dist --access public --provenance
