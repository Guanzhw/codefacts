name: Release native binaries

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  license-audit:
    name: Audit dependency licenses
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-deny --version 0.20.2 --locked
      - run: cargo deny check licenses

  validate:
    name: Validate release source (${{ matrix.os }})
    needs: license-audit
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --all-targets --locked
      - run: cargo clippy --all-targets --locked -- -D warnings

  build:
    name: Build (${{ matrix.name }})
    needs: validate
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x86_64
            os: windows-latest
            archive: codefacts-windows-x86_64.zip
          - name: macos
            os: macos-latest
            archive: codefacts-macos.tar.gz
          - name: linux-x86_64
            os: ubuntu-latest
            archive: codefacts-linux-x86_64.tar.gz
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release --locked --bin codefacts
      - name: Archive Windows binary
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path target/release/codefacts.exe,LICENSE -DestinationPath ${{ matrix.archive }}
      - name: Archive Unix binary
        if: runner.os != 'Windows'
        run: tar -czf ${{ matrix.archive }} -C target/release codefacts -C ../.. LICENSE
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.archive }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
