name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - name: Test all targets
        run: cargo test --all-targets --locked
      - name: Build deployed binary
        run: cargo build --release --locked --bin codefacts
      - name: Verify npm launcher package and protocol
        run: |
          node npm/scripts/check-release-version.mjs
          node --test npm/test/*.test.mjs

  quality:
    name: Formatting and lints
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
      - run: cargo clippy --all-targets --locked -- -D warnings
